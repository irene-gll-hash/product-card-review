experiment: defect_classification_resnet18
task: multilabel_classification
model:
  name: resnet18
  pretrained: true
  num_classes: 6
data:
  config: configs/data.yaml
training:
  epochs: 30
  learning_rate: 0.0003
  weight_decay: 0.0001
  loss: bce_with_logits
output:
  directory: experiments/defect_classification/results/resnet18
